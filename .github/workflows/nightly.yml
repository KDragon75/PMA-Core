name: Nightly stress

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: tests/llm-simulation/package-lock.json
      - run: npm ci --prefix tests/llm-simulation
      - run: npm --prefix tests/llm-simulation run simulate -- --interactions 1000 --mode pi-like --output ../../nightly-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-stress-report
          path: nightly-report.json
